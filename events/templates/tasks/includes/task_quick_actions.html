{% load static %}

<!-- ============================================================
     PANEL DE ACCIONES RÁPIDAS
     ============================================================ -->
<div class="card border-0 shadow-sm quick-actions-panel">
    <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="card-title mb-0 small fw-semibold text-uppercase text-muted">
            <i class="bi bi-gear-fill me-2"></i>Quick Actions
        </h6>
    </div>
    <div class="card-body pt-2 pb-3">
        <div class="row g-2">
            <!-- Crear tarea -->
            <div class="col-12 col-sm-6 col-md-3">
                <a href="{% url 'events:task_create' %}" class="btn btn-success w-100 d-flex align-items-center justify-content-center py-2 py-md-2">
                    <i class="bi bi-plus-circle fs-5 me-2"></i>
                    <span class="small fw-medium">Create Task</span>
                </a>
            </div>
            
            <!-- Edición masiva -->
            <div class="col-12 col-sm-6 col-md-3">
                <button type="button" class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center py-2 py-md-2" id="bulkEditBtn">
                    <i class="bi bi-pencil fs-5 me-2"></i>
                    <span class="small fw-medium">Bulk Edit</span>
                </button>
            </div>
            
            <!-- Exportar tareas -->
            <div class="col-12 col-sm-6 col-md-3">
                <button type="button" class="btn btn-outline-info w-100 d-flex align-items-center justify-content-center py-2 py-md-2" id="exportTasksBtn">
                    <i class="bi bi-download fs-5 me-2"></i>
                    <span class="small fw-medium">Export</span>
                </button>
            </div>
            
            <!-- Filtro avanzado -->
            <div class="col-12 col-sm-6 col-md-3">
                <button type="button" class="btn btn-outline-warning w-100 d-flex align-items-center justify-content-center py-2 py-md-2" id="filterTasksBtn">
                    <i class="bi bi-funnel fs-5 me-2"></i>
                    <span class="small fw-medium">Advanced Filter</span>
                </button>
            </div>
        </div>
        
        <!-- Fila de estadísticas rápidas -->
        <div class="row mt-3 pt-1 border-top">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center small text-muted">
                    <span><i class="bi bi-check-circle text-success me-1"></i> {{ completed_count }} completed</span>
                    <span><i class="bi bi-arrow-repeat text-warning me-1"></i> {{ in_progress_count }} in progress</span>
                    <span><i class="bi bi-clock text-secondary me-1"></i> {{ pending_count }} pending</span>
                </div>
            </div>
        </div>
    </div>
</div>
