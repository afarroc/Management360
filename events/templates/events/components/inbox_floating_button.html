{% load static %}
<!-- ============================================================================
     INBOX GTD FLOATING BUTTON - GLOBAL ACCESS COMPONENT
     ============================================================================
     This template contains the HTML structure for the global inbox GTD
     floating button that provides quick access to inbox functionality from any page.

     Features:
     - Floating button with pulse animation
     - Expandable panel with quick capture form
     - Real-time statistics display
     - Toast notifications integration
     - Responsive design for all screen sizes
     - Accessibility features (keyboard navigation, ARIA labels)

     Dependencies:
     - Bootstrap 5.x
     - Bootstrap Icons
     - inbox_floating_button.css
     - inbox_floating_button.js

     ============================================================================ -->

<!-- Inbox GTD Floating Container -->
<div id="inboxFloatingContainer" class="inbox-floating-container">
    <!-- Floating Button -->
    <div class="inbox-floating-button" id="inboxFloatingButton" role="button" tabindex="0" aria-label="Abrir Inbox GTD">
        <div class="inbox-button-content">
            <i class="bi bi-lightning-charge-fill inbox-icon-main"></i>
            <span class="inbox-badge" id="inboxBadge">0</span>
        </div>
        <div class="inbox-pulse-ring"></div>
    </div>

    <!-- Expandable Panel -->
    <div class="inbox-panel" id="inboxPanel" role="dialog" aria-labelledby="inboxPanelTitle" aria-hidden="true">
        <!-- Panel Header -->
        <div class="inbox-panel-header">
            <h3 class="inbox-panel-title" id="inboxPanelTitle">
                <i class="bi bi-inbox-fill"></i>
                Inbox GTD
            </h3>
            <button class="inbox-panel-close" id="inboxPanelClose" aria-label="Cerrar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- Panel Body -->
        <div class="inbox-panel-body">
            <!-- Quick Capture Form -->
            <form class="inbox-quick-form" id="inboxQuickForm" autocomplete="off">
                <div class="inbox-form-group">
                    <label for="inboxQuickTitle">Título *</label>
                    <input type="text" id="inboxQuickTitle" name="title" 
                           placeholder="¿Qué necesitas capturar?" required>
                </div>
            
                <div class="inbox-form-group">
                    <label for="inboxQuickDescription">Descripción</label>
                    <textarea id="inboxQuickDescription" name="description" 
                              placeholder="Detalles..." rows="3"></textarea>
                </div>
            
                <div class="inbox-form-actions">
                    <button type="submit" class="inbox-btn inbox-btn-primary" id="inboxQuickSubmit">
                        <i class="bi bi-lightning-charge-fill"></i>
                        Capturar
                    </button>
                    <button type="button" class="inbox-btn inbox-btn-secondary" 
                            onclick="window.open('/events/inbox/', '_blank')">
                        <i class="bi bi-box-arrow-up-right"></i>
                        Ver Todo
                    </button>
                </div>
            </form>

            <!-- Statistics -->
            <div class="inbox-stats">
                <div class="inbox-stats-grid">
                    <div class="inbox-stat-item">
                        <div class="inbox-stat-number" id="inboxStatTotal">0</div>
                        <div class="inbox-stat-label">Total</div>
                    </div>
                    <div class="inbox-stat-item">
                        <div class="inbox-stat-number" id="inboxStatUnprocessed">0</div>
                        <div class="inbox-stat-label">Pendientes</div>
                    </div>
                    <div class="inbox-stat-item">
                        <div class="inbox-stat-number" id="inboxStatProcessed">0</div>
                        <div class="inbox-stat-label">Procesados</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Overlay se crea dinámicamente en JavaScript -->
<!-- Toast Notification Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="inboxToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="bi bi-info-circle me-2"></i>
            <strong class="me-auto">Inbox GTD</strong>
            <small>Ahora</small>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Cerrar"></button>
        </div>
        <div class="toast-body" id="inboxToastBody">
            <!-- Notification message will go here -->
        </div>
    </div>
</div>

<!-- Quick Access Tooltip (shown on hover) -->
<div class="inbox-tooltip" id="inboxTooltip" role="tooltip" aria-hidden="true">
    <div class="inbox-tooltip-content">
        <strong>Inbox GTD</strong>
        <small>Captura rápida de ideas y tareas</small>
        <div class="inbox-tooltip-shortcut">
            <kbd>Ctrl</kbd> + <kbd>I</kbd>
        </div>
    </div>
</div>

<!-- ============================================================================
     ACCESSIBILITY ENHANCEMENTS
     ============================================================================ -->

<!-- Screen Reader Announcements -->
<div id="inboxAnnouncements" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<!-- ============================================================================
     STYLE OVERRIDES (for specific customizations)
     ============================================================================ -->
<style>
/* Custom styles that complement the main CSS file */

/* Enhanced focus styles for better accessibility */
.inbox-floating-button:focus-visible {
    outline: 3px solid #007bff;
    outline-offset: 3px;
}

/* Button styles */
.inbox-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 40px;
}

.inbox-btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.inbox-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.inbox-btn-secondary {
    background: #6c757d;
    color: white;
}

.inbox-btn-secondary:hover {
    background: #5a6268;
    transform: translateY(-2px);
}

.inbox-btn-outline {
    background: transparent;
    border: 1px solid #dee2e6;
    color: #495057;
}

.inbox-btn-outline:hover {
    background: #f8f9fa;
    border-color: #667eea;
    color: #667eea;
}

/* Form actions */
.inbox-form-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.inbox-form-actions .inbox-btn {
    flex: 1;
    min-width: 120px;
}

/* Quick actions */
.inbox-quick-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.inbox-quick-actions .inbox-btn {
    flex: 1;
    min-width: 100px;
    font-size: 13px;
    padding: 6px 12px;
}

/* Loading animation for the submit button */
.inbox-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none !important;
}

/* Enhanced badge animation */
.inbox-badge {
    animation: badgePulse 2s infinite;
}

@keyframes badgePulse {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 2px 8px rgba(220, 53, 69, 0.3);
    }
    50% {
        transform: scale(1.1);
        box-shadow: 0 4px 12px rgba(220, 53, 69, 0.5);
    }
}

/* Tooltip styles */
.inbox-tooltip {
    position: absolute;
    bottom: 80px;
    right: 70px;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s ease;
    z-index: 1052;
    white-space: nowrap;
}

.inbox-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    right: 20px;
    border: 5px solid transparent;
    border-top-color: rgba(0, 0, 0, 0.9);
}

.inbox-floating-button:hover + .inbox-tooltip,
.inbox-tooltip:hover {
    opacity: 1;
    visibility: visible;
}

.inbox-tooltip-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.inbox-tooltip-shortcut {
    margin-top: 4px;
    display: flex;
    gap: 2px;
    align-items: center;
}

.inbox-tooltip-shortcut kbd {
    background: rgba(255, 255, 255, 0.2);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
}

/* Screen reader only styles */
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

.sr-only-focusable:focus {
    position: static;
    width: auto;
    height: auto;
    padding: 8px 16px;
    margin: 0;
    overflow: visible;
    clip: auto;
    white-space: normal;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .inbox-tooltip {
        display: none;
    }

    .inbox-stats-grid {
        grid-template-columns: repeat(3, 1fr);
    }

    .inbox-form-actions {
        flex-direction: column;
    }

    .inbox-form-actions .inbox-btn {
        width: 100%;
    }

    .inbox-quick-actions {
        flex-direction: column;
    }

    .inbox-quick-actions .inbox-btn {
        width: 100%;
    }
}

@media (max-width: 480px) {
    .inbox-stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .inbox-form-actions {
        flex-direction: column;
    }

    .inbox-btn-secondary {
        margin-top: 8px;
    }

    .inbox-btn {
        min-height: 44px; /* Better touch target for mobile */
        font-size: 16px; /* Prevent iOS zoom */
    }
}

/* Mobile keyboard specific */
@media (max-width: 768px) {
    .inbox-panel-body {
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    
    .inbox-btn {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
}
</style>

<!-- ============================================================================
     INITIALIZATION SCRIPT
     ============================================================================ -->
<script>
// Initialize tooltips and other Bootstrap components when document is ready
document.addEventListener('DOMContentLoaded', function() {
    // Initialize Bootstrap tooltips if available
    if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    }

    // Add keyboard shortcut hint on first visit
    const hasSeenShortcut = localStorage.getItem('inboxGTD_shortcut_shown');
    if (!hasSeenShortcut) {
        setTimeout(() => {
            const tooltip = document.getElementById('inboxTooltip');
            if (tooltip) {
                tooltip.style.opacity = '1';
                tooltip.style.visibility = 'visible';
                setTimeout(() => {
                    tooltip.style.opacity = '0';
                    tooltip.style.visibility = 'hidden';
                }, 3000);
            }
            localStorage.setItem('inboxGTD_shortcut_shown', 'true');
        }, 3000);
    }

    // Bind button events
    const refreshBtn = document.getElementById('inboxRefreshBtn');
    const processBtn = document.getElementById('inboxProcessBtn');
    const clearBtn = document.getElementById('inboxClearBtn');

    if (refreshBtn && window.inboxGTD) {
        refreshBtn.addEventListener('click', function() {
            window.inboxGTD.refreshData();
            window.inboxGTD.showNotification('Datos actualizados', 'info');
        });
    }

    if (processBtn) {
        processBtn.addEventListener('click', function() {
            window.open('/events/inbox/process/', '_blank');
        });
    }

    if (clearBtn) {
        clearBtn.addEventListener('click', function() {
            const titleInput = document.getElementById('inboxQuickTitle');
            const descInput = document.getElementById('inboxQuickDescription');
            
            if (titleInput) titleInput.value = '';
            if (descInput) descInput.value = '';
            
            if (window.inboxGTD) {
                window.inboxGTD.showNotification('Formulario limpiado', 'info');
            }
        });
    }
});
</script>
