<div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
    <div>
        {% if prev_url %}
        <a href="{{ prev_url }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Anterior
        </a>
        {% else %}
        <a href="{% url 'cv:cv_detail' %}" class="btn btn-outline-secondary">
            <i class="bi bi-x-circle me-1"></i>Cancelar
        </a>
        {% endif %}
    </div>
    
    <div class="d-flex gap-2">
        <a href="{% url 'cv:cv_detail' %}" class="btn btn-outline-info">
            <i class="bi bi-eye me-1"></i>Ver CV
        </a>
        <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-1"></i>{{ submit_text|default:"Guardar" }}
        </button>
    </div>
</div>
